<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Memory Pet Gallery</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #f4f9ff;
            color: #333;
        }

        /* Navigation */
        nav {
            background: #6c63ff;
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        nav img {
            width: 60px;
            height: 60px;
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 25px;
        }

        nav ul li a {
            color: white;
            text-decoration: none;
            font-weight: bold;
            font-size: 18px;
        }

        nav ul li a:hover {
            color: #ffe66d;
        }

        /* Gallery Heading */
        .gallery-title {
            text-align: center;
            padding: 50px 20px;
        }

        .gallery-title h1 {
            color: #6c63ff;
            font-size: 45px;
            margin-bottom: 15px;
        }

        .gallery-title p {
            font-size: 18px;
        }


        /* Gallery */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 25px;
            padding: 40px;
        }

        .image-card {
            background: white;
            border-radius: 20px;
            padding: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: 0.3s;
        }

        .image-card:hover {
            transform: translateY(-10px);
        }

        .image-card img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            border-radius: 15px;
        }

        .image-card h3 {
            text-align: center;
            margin-top: 15px;
            color: #6c63ff;
        }


        /* Footer */
        footer {
            background: #6c63ff;
            color: white;
            text-align: center;
            padding: 20px;
        }


        @media(max-width:768px) {

            nav {
                flex-direction: column;
            }

            nav ul {
                margin-top: 15px;
            }

        }

    </style>

</head>

<body>


    <!-- Navigation -->
    <nav>

        <img src="images/logo.png" alt="My Memory Pet Logo">

        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="product.html">Product</a></li>
            <li><a href="gallery.html">Gallery</a></li>
        </ul>

    </nav>


    <!-- Title -->
    <section class="gallery-title">

        <h1>My Memory Pet Gallery</h1>

        <p>
            Explore pictures of your friendly AI pet and its adventures.
        </p>

    </section>



    <!-- Gallery Images -->
    <section class="gallery">


        <div class="image-card">
            <img src="images/gallery1.jpg" alt="AI Pet Image 1">
            <h3>Friendly Pet</h3>
        </div>


        <div class="image-card">
            <img src="images/gallery2.jpg" alt="AI Pet Image 2">
            <h3>Happy Moments</h3>
        </div>


        <div class="image-card">
            <img src="images/gallery3.jpg" alt="AI Pet Image 3">
            <h3>Learning Together</h3>
        </div>


        <div class="image-card">
            <img src="images/gallery4.jpg" alt="AI Pet Image 4">
            <h3>Fun Adventures</h3>
        </div>


    </section>



    <!-- Footer -->
    <footer>

        <p>© 2026 My Memory Pet. All rights reserved.</p>

    </footer>


</body>
</html>

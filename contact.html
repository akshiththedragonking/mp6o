<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact My Memory Pet</title>

    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #f4f9ff;
            color: #333;
        }


        /* Navigation */
        nav {
            background: #6c63ff;
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        nav img {
            width: 60px;
            height: 60px;
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 25px;
        }

        nav ul li a {
            color: white;
            text-decoration: none;
            font-size: 18px;
            font-weight: bold;
        }

        nav ul li a:hover {
            color: #ffe66d;
        }


        /* Contact Section */
        .contact {
            padding: 60px 30px;
            text-align: center;
        }

        .contact h1 {
            color: #6c63ff;
            font-size: 45px;
            margin-bottom: 15px;
        }

        .contact p {
            font-size: 18px;
            margin-bottom: 30px;
        }


        /* Form */
        .form-box {
            background: white;
            max-width: 600px;
            margin: auto;
            padding: 35px;
            border-radius: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }


        input, textarea {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
        }


        textarea {
            height: 150px;
            resize: none;
        }


        button {
            background: #ff6b6b;
            color: white;
            border: none;
            padding: 15px 35px;
            border-radius: 30px;
            font-size: 18px;
            cursor: pointer;
            transition: 0.3s;
        }


        button:hover {
            background: #ff4757;
            transform: scale(1.05);
        }


        /* Contact Info */
        .info {
            margin-top: 40px;
        }

        .info h2 {
            color: #6c63ff;
            margin-bottom: 15px;
        }


        /* Footer */
        footer {
            background: #6c63ff;
            color: white;
            text-align: center;
            padding: 20px;
        }


        @media(max-width:768px) {

            nav {
                flex-direction: column;
            }

            nav ul {
                margin-top: 15px;
                flex-wrap: wrap;
                justify-content: center;
            }

        }

    </style>

</head>


<body>


    <!-- Navigation -->
    <nav>

        <img src="images/logo.png" alt="My Memory Pet Logo">

        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="product.html">Product</a></li>
            <li><a href="gallery.html">Gallery</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>

    </nav>



    <!-- Contact Section -->
    <section class="contact">

        <h1>Contact My Memory Pet</h1>

        <p>
            Have questions or ideas? We would love to hear from you!
        </p>


        <div class="form-box">

            <form>

                <input type="text" placeholder="Your Name">

                <input type="email" placeholder="Your Email">

                <textarea placeholder="Your Message"></textarea>

                <button type="submit">
                    Send Message
                </button>

            </form>

        </div>



        <div class="info">

            <h2>Get In Touch</h2>

            <p>
                Email: support@mymemorypet.com
            </p>

            <p>
                We are always happy to help our My Memory Pet friends!
            </p>

        </div>


    </section>



    <!-- Footer -->
    <footer>

        <p>© 2026 My Memory Pet. All rights reserved.</p>

    </footer>


</body>
</html>
